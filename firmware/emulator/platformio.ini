[env:megaatmega2560]
framework = arduino
monitor_speed = 115200
upload_port = auto
platform = atmelavr
board = megaatmega2560
upload_speed = 115200
build_flags = 
    -D ARDUINO_MEGA=1
    -D BOARD_ATmega2560
lib_deps = throwtheswitch/Unity @ ^2.6.0
test_ignore = test_native

[env:nanoatmega328]
framework = arduino
monitor_speed = 115200
upload_port = auto
platform = atmelavr
board = nanoatmega328
upload_speed = 115200
build_flags = 
    -D ARDUINO_NANO=1
    -D BOARD_ATmega328
lib_deps = throwtheswitch/Unity @ ^2.6.0
test_ignore = test_native

[env:native]
platform = native
build_type = test
build_flags = -I test/native
lib_deps = throwtheswitch/Unity @ ^2.6.0
test_ignore = test_embedded
