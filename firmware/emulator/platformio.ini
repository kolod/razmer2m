[env]
framework = arduino
monitor_speed = 115200
upload_port = auto

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
upload_speed = 115200
build_flags = 
    -D ARDUINO_MEGA=1
    -D BOARD_ATmega2560

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
upload_speed = 115200
build_flags = 
    -D ARDUINO_NANO=1
    -D BOARD_ATmega328
