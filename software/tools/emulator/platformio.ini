[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino

; Monitor settings
monitor_speed = 9600

; Build flags
build_flags = 
    -D ARDUINO_MEGA=1
    -D BOARD_ATmega2560

; Upload settings
upload_port = auto
upload_speed = 115200


[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino

; Monitor settings
monitor_speed = 9600

; Build flags
build_flags = 
    -D ARDUINO_NANO=1
    -D BOARD_ATmega2560

; Upload settings
upload_port = auto
upload_speed = 115200